<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>ASX RTO Screener</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--sur:#161b22;--bdr:#30363d;
  --txt:#e6edf3;--mut:#8b949e;
  --red:#f85149;--amb:#e3b341;--grn:#3fb950;--blu:#58a6ff;
  --red-dim:rgba(248,81,73,.15);--amb-dim:rgba(227,179,65,.15);--grn-dim:rgba(63,185,80,.15);
}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;-webkit-text-size-adjust:100%}

/* Spinner */
#load-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--blu);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* App */
#app{display:none;flex-direction:column;min-height:100vh}

/* Header */
#hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#hdr h1{font-size:15px;font-weight:600;white-space:nowrap}
.meta{color:var(--mut);font-size:11px;display:flex;gap:10px;flex-wrap:wrap;margin-left:auto}
.meta span{white-space:nowrap}

/* Badges */
.badges{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;background:var(--sur);border-bottom:1px solid var(--bdr)}
.badge{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border-width:1px;border-style:solid;min-height:36px;display:inline-flex;align-items:center;transition:opacity .15s}
.badge:hover{opacity:.75}
.badge.active{outline:2px solid var(--blu);outline-offset:1px}
.b-red{background:var(--red-dim);color:var(--red);border-color:rgba(248,81,73,.3)}
.b-amb{background:var(--amb-dim);color:var(--amb);border-color:rgba(227,179,65,.3)}
.b-grn{background:var(--grn-dim);color:var(--grn);border-color:rgba(63,185,80,.3)}
.b-mut{background:rgba(139,148,158,.1);color:var(--mut);border-color:rgba(139,148,158,.2)}

/* Desktop table */
#tbl-wrap{padding:16px;overflow-x:auto;flex:1}
table{width:100%;border-collapse:collapse}
thead th{background:var(--sur);color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:1}
thead th:hover{color:var(--txt)}
thead th.sort-asc::after{content:" ▲";opacity:.5}
thead th.sort-desc::after{content:" ▼";opacity:.5}
th.l{text-align:left} th.r{text-align:right}
tbody tr{border-bottom:1px solid rgba(48,54,61,.5);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.03)}
td{padding:8px 10px;vertical-align:middle;white-space:nowrap}
td.l{text-align:left} td.r{text-align:right}
td.tk a{color:var(--blu);text-decoration:none;font-weight:600;font-size:13px}
td.tk a:hover{text-decoration:underline}
td.co{max-width:180px;overflow:hidden;text-overflow:ellipsis;color:var(--mut);font-size:12px}
.pos{color:var(--grn)} .neg{color:var(--red)} .neu{color:var(--mut)}
.tier-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;min-width:80px;text-align:center}
.t-red{background:var(--red-dim);color:var(--red)}
.t-amb{background:var(--amb-dim);color:var(--amb)}
.t-grn{background:var(--grn-dim);color:var(--grn)}
#empty{text-align:center;padding:60px 0;color:var(--mut);display:none}

/* Mobile cards */
#cards{display:none;padding:10px 12px;flex-direction:column;gap:10px;flex:1}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:14px}
.ct{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.ck a{font-size:19px;font-weight:700;color:var(--blu);text-decoration:none;flex:1;line-height:1}
.cn{font-size:12px;color:var(--mut);margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cd{height:1px;background:var(--bdr);margin:10px 0}
.cm{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 8px}
.cml{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;display:block}
.cmv{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
#empty-c{text-align:center;padding:60px 16px;color:var(--mut);display:none}

/* Responsive */
@media(max-width:700px){
  #tbl-wrap{display:none}
  #cards{display:flex}
  .meta{font-size:10px;gap:8px}
  #hdr h1{font-size:14px}
  .badges{gap:5px;padding:8px 12px}
  .badge{font-size:11px;padding:4px 10px;min-height:32px}
  .cm{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div id="load-screen">
  <div class="spinner"></div>
  <p style="color:var(--mut);font-size:13px">Loading…</p>
</div>

<div id="app">
  <div id="hdr">
    <h1>ASX RTO Screener</h1>
    <div class="meta">
      <span>Run: <strong id="hdr-date">—</strong></span>
      <span>Flagged: <strong id="hdr-n">—</strong></span>
    </div>
  </div>

  <div class="badges">
    <span id="b-unexp" class="badge b-red" onclick="ft('UNEXPLAINED')"><span id="n-unexp">0</span> Unexplained</span>
    <span id="b-uncl"  class="badge b-amb" onclick="ft('UNCLEAR')"><span id="n-uncl">0</span> Unclear</span>
    <span id="b-expl"  class="badge b-grn" onclick="ft('EXPLAINED')"><span id="n-expl">0</span> Explained</span>
    <span id="b-all"   class="badge b-mut" onclick="ft('')"><span id="n-all">0</span> All</span>
  </div>

  <div id="tbl-wrap">
    <table id="tbl">
      <thead><tr>
        <th class="l" data-k="tier_num">Tier</th>
        <th class="l" data-k="ticker">Ticker</th>
        <th class="l" data-k="name">Company</th>
        <th class="r" data-k="market_cap_aud">Mkt Cap</th>
        <th class="r" data-k="vol_ratio">Vol Ratio</th>
        <th class="r" data-k="abnormal_drift">Drift %</th>
        <th class="r" data-k="days_since_material">Days Since Ann</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty">No stocks match the current filter.</div>
  </div>

  <div id="cards">
    <div id="empty-c">No stocks match the current filter.</div>
  </div>
</div>

<script>
'use strict';

/* @@BAKED_CSV_START@@ */
var BAKED_CSV = "ticker,name,explanation_label,vol_ratio,abnormal_drift,days_since_material,market_cap_aud,asx_url,run_timestamp\nPKO,PEAKO LIMITED,UNEXPLAINED,3.53,0.9212,,10414194.321451709,https://www.asx.com.au/markets/company/PKO/announcements,2026-03-03 13:55 UTC\nPGY,PILOT ENERGY LIMITED,UNCLEAR,3.454,0.1635,,8634639.807000756,https://www.asx.com.au/markets/company/PGY/announcements,2026-03-03 13:55 UTC\nQEM,QEM LIMITED,EXPLAINED,9.398,1.2244,1.0,12115515.25865069,https://www.asx.com.au/markets/company/QEM/announcements,2026-03-03 13:55 UTC\nGR8,GREAT DIRT RESOURCES LTD,EXPLAINED,6.422,1.1247,4.0,29374572.885917544,https://www.asx.com.au/markets/company/GR8/announcements,2026-03-03 13:55 UTC\nAKN,AUKING MINING LIMITED,EXPLAINED,3.458,1.1462,0.0,12105828.829413634,https://www.asx.com.au/markets/company/AKN/announcements,2026-03-03 13:55 UTC\nREC,RECHARGE METALS LIMITED,EXPLAINED,15.957,0.6867,0.0,12861867.810905911,https://www.asx.com.au/markets/company/REC/announcements,2026-03-03 13:55 UTC\nGGE,GRAND GULF ENERGY LIMITED,EXPLAINED,4.341,0.925,8.0,9361275.081371423,https://www.asx.com.au/markets/company/GGE/announcements,2026-03-03 13:55 UTC\nHMG,HAMELIN GOLD LIMITED,EXPLAINED,4.013,0.9217,8.0,25779463.284414887,https://www.asx.com.au/markets/company/HMG/announcements,2026-03-03 13:55 UTC\nFAU,FIRST AU LIMITED,EXPLAINED,4.112,0.8796,22.0,44565242.57691631,https://www.asx.com.au/markets/company/FAU/announcements,2026-03-03 13:55 UTC\nLAT,LATITUDE 66 LIMITED,EXPLAINED,4.056,0.8108,0.0,35441610.23000944,https://www.asx.com.au/markets/company/LAT/announcements,2026-03-03 13:55 UTC\nLSA,LACHLAN STAR LIMITED,EXPLAINED,9.177,0.6719,22.0,35498783.206540346,https://www.asx.com.au/markets/company/LSA/announcements,2026-03-03 13:55 UTC\nGMN,GOLD MOUNTAIN LIMITED,EXPLAINED,4.939,0.7486,2.0,23329752.918539375,https://www.asx.com.au/markets/company/GMN/announcements,2026-03-03 13:55 UTC\nOZM,OZAURUM RESOURCES LIMITED,EXPLAINED,5.697,0.6808,13.0,28610188.12632502,https://www.asx.com.au/markets/company/OZM/announcements,2026-03-03 13:55 UTC\nERL,EMPIRE RESOURCES LIMITED,EXPLAINED,4.964,0.6219,4.0,25863482.568320103,https://www.asx.com.au/markets/company/ERL/announcements,2026-03-03 13:55 UTC\nT92,TERRA CRITICAL MINERALS LIMITED,EXPLAINED,3.146,0.655,0.0,11424146.98009707,https://www.asx.com.au/markets/company/T92/announcements,2026-03-03 13:55 UTC\nVKA,VIKING MINES LIMITED,EXPLAINED,3.736,0.6027,0.0,46053969.09112825,https://www.asx.com.au/markets/company/VKA/announcements,2026-03-03 13:55 UTC\nRGL,RIVERSGOLD LIMITED,EXPLAINED,4.684,0.4964,2.0,41196824.900567286,https://www.asx.com.au/markets/company/RGL/announcements,2026-03-03 13:55 UTC\nOLY,OLYMPIO METALS LIMITED,EXPLAINED,11.297,0.3051,7.0,7907298.274179347,https://www.asx.com.au/markets/company/OLY/announcements,2026-03-03 13:55 UTC\nJAV,JAVELIN MINERALS LIMITED,EXPLAINED,3.169,0.487,4.0,38137263.36761333,https://www.asx.com.au/markets/company/JAV/announcements,2026-03-03 13:55 UTC\nCTN,CATALINA RESOURCES LTD,EXPLAINED,3.592,0.4347,1.0,11940068.207301497,https://www.asx.com.au/markets/company/CTN/announcements,2026-03-03 13:55 UTC\nBTM,BREAKTHROUGH MINERALS LIMITED,EXPLAINED,2.875,0.4265,0.0,27082885.793248564,https://www.asx.com.au/markets/company/BTM/announcements,2026-03-03 13:55 UTC\nEV1,EVOLUTION ENERGY MINERALS LIMITED,EXPLAINED,3.491,0.3874,8.0,7530218.564432923,https://www.asx.com.au/markets/company/EV1/announcements,2026-03-03 13:55 UTC\nVR8,VANADIUM RESOURCES LIMITED,EXPLAINED,2.543,0.3897,41.0,14993201.05032606,https://www.asx.com.au/markets/company/VR8/announcements,2026-03-03 13:55 UTC\nDUN,DUNDAS MINERALS LIMITED,EXPLAINED,4.316,0.3304,8.0,9774063.545644894,https://www.asx.com.au/markets/company/DUN/announcements,2026-03-03 13:55 UTC\nAEV,AVENIRA LIMITED,EXPLAINED,3.77,0.3419,4.0,34069154.09819791,https://www.asx.com.au/markets/company/AEV/announcements,2026-03-03 13:55 UTC\nBPM,BPM MINERALS LIMITED,EXPLAINED,3.387,0.3238,5.0,37000459.98070541,https://www.asx.com.au/markets/company/BPM/announcements,2026-03-03 13:55 UTC\nMHM,MOUNT HOPE MINING LIMITED,EXPLAINED,2.73,0.3343,29.0,9520628.667697012,https://www.asx.com.au/markets/company/MHM/announcements,2026-03-03 13:55 UTC\nNAG,NAGAMBIE RESOURCES LIMITED,EXPLAINED,4.158,0.2986,1.0,13422969.736322647,https://www.asx.com.au/markets/company/NAG/announcements,2026-03-03 13:55 UTC\nGTE,GREAT WESTERN EXPLORATION LIMITED.,EXPLAINED,2.771,0.2965,2.0,13482233.563476915,https://www.asx.com.au/markets/company/GTE/announcements,2026-03-03 13:55 UTC\nEG1,EVERGOLD MINERALS LIMITED,EXPLAINED,2.852,0.2861,5.0,10793215.488650203,https://www.asx.com.au/markets/company/EG1/announcements,2026-03-03 13:55 UTC\nEMC,EVEREST METALS CORPORATION LTD,EXPLAINED,4.495,0.2363,6.0,37758982.54075791,https://www.asx.com.au/markets/company/EMC/announcements,2026-03-03 13:55 UTC\nRR1,REACH RESOURCES LIMITED,EXPLAINED,2.556,0.2733,0.0,13990902.248532167,https://www.asx.com.au/markets/company/RR1/announcements,2026-03-03 13:55 UTC\nGAL,GALILEO MINING LTD,EXPLAINED,2.924,0.2529,5.0,44465607.84706363,https://www.asx.com.au/markets/company/GAL/announcements,2026-03-03 13:55 UTC\nEMN,EURO MANGANESE INC,EXPLAINED,2.696,0.2041,2.0,30674336.095315218,https://www.asx.com.au/markets/company/EMN/announcements,2026-03-03 13:55 UTC\nNAE,NEW AGE EXPLORATION LIMITED,EXPLAINED,3.191,0.1869,1.0,18926600.507751472,https://www.asx.com.au/markets/company/NAE/announcements,2026-03-03 13:55 UTC\n";
/* @@BAKED_CSV_END@@ */

var ALL=[], FILT=[], TIER='', SK='tier_num', SA=true;

function num(s){ var v=parseFloat(s); return isNaN(v)?null:v; }

function parseCSV(text){
  var lines=text.split('\n'), headers=splitLine(lines[0]), col={};
  headers.forEach(function(h,i){ col[h.trim()]=i; });
  function g(row,name){ var i=col[name]; return i!==undefined?(row[i]||'').trim():''; }
  var rows=[], maxTS='';
  for(var i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    var row=splitLine(lines[i]);
    var lbl=g(row,'explanation_label');
    var ts=g(row,'run_timestamp');
    if(ts>maxTS) maxTS=ts;
    var tn={UNEXPLAINED:0,UNCLEAR:1,EXPLAINED:2}[lbl]??3;
    var cap=g(row,'market_cap_aud'), days=g(row,'days_since_material');
    rows.push({
      ticker: g(row,'ticker'),
      name:   g(row,'name'),
      asx_url:g(row,'asx_url'),
      tier_label: lbl||'FLAGGED',
      tier_num:   tn,
      vol_ratio:          num(g(row,'vol_ratio'))??0,
      abnormal_drift:     num(g(row,'abnormal_drift'))??0,
      market_cap_aud:     (cap&&cap!=='nan')?num(cap):null,
      days_since_material:(days&&days!=='nan')?(parseInt(days,10)||null):null,
      run_ts: ts,
    });
  }
  var latest = maxTS ? rows.filter(function(r){return r.run_ts===maxTS;}) : rows;
  return {rows:latest, ts:maxTS};
}

function splitLine(line){
  var out=[],cur='',inq=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){ inq=!inq; }
    else if(c===','&&!inq){ out.push(cur);cur=''; }
    else cur+=c;
  }
  out.push(cur);
  return out;
}

function boot(text){
  var p=parseCSV(text);
  ALL=p.rows;
  document.getElementById('load-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('hdr-date').textContent=p.ts||'—';
  document.getElementById('hdr-n').textContent=ALL.length;
  document.getElementById('n-unexp').textContent=ALL.filter(function(r){return r.tier_label==='UNEXPLAINED';}).length;
  document.getElementById('n-uncl').textContent =ALL.filter(function(r){return r.tier_label==='UNCLEAR';}).length;
  document.getElementById('n-expl').textContent =ALL.filter(function(r){return r.tier_label==='EXPLAINED';}).length;
  document.getElementById('n-all').textContent  =ALL.length;
  render();
}

function ft(t){ TIER=(TIER===t)?'':t; render(); }

function render(){
  FILT=ALL.filter(function(r){ return !TIER||r.tier_label===TIER; });
  var dir=SA?1:-1;
  FILT.sort(function(a,b){
    var av=a[SK],bv=b[SK];
    if(av===null||av===undefined) av=dir>0?Infinity:-Infinity;
    if(bv===null||bv===undefined) bv=dir>0?Infinity:-Infinity;
    return typeof av==='string'?dir*av.localeCompare(bv):dir*(av-bv);
  });
  ['b-unexp','b-uncl','b-expl','b-all'].forEach(function(id,i){
    var lbl=['UNEXPLAINED','UNCLEAR','EXPLAINED',''][i];
    document.getElementById(id).classList.toggle('active',TIER===lbl);
  });
  renderTable(); renderCards();
}

function fmtCap(v){
  if(v===null) return '<span class="neu">—</span>';
  return v>=1e9?'$'+(v/1e9).toFixed(2)+'B':'$'+(v/1e6).toFixed(1)+'M';
}
function fmtCapPlain(v){
  if(v===null) return '—';
  return v>=1e9?'$'+(v/1e9).toFixed(2)+'B':'$'+(v/1e6).toFixed(1)+'M';
}
function fmtDrift(v){
  var s=(v>=0?'+':'')+(v*100).toFixed(1)+'%';
  return '<span class="'+(v>0?'pos':v<0?'neg':'neu')+'">'+s+'</span>';
}
function tierBadge(lbl){
  var m={UNEXPLAINED:['t-red','UNEXPLAINED'],UNCLEAR:['t-amb','UNCLEAR'],EXPLAINED:['t-grn','EXPLAINED']};
  var e=m[lbl]||['t-mut',lbl];
  return '<span class="tier-badge '+e[0]+'">'+e[1]+'</span>';
}

function renderTable(){
  var tb=document.getElementById('tbody'), em=document.getElementById('empty');
  if(!FILT.length){tb.innerHTML='';em.style.display='';return;}
  em.style.display='none';
  tb.innerHTML=FILT.map(function(r){
    return '<tr>'+
      '<td class="l">'+tierBadge(r.tier_label)+'</td>'+
      '<td class="tk l"><a href="'+(r.asx_url||'#')+'" target="_blank" rel="noopener">'+r.ticker+'</a></td>'+
      '<td class="co l" title="'+r.name+'">'+r.name+'</td>'+
      '<td class="r">'+fmtCap(r.market_cap_aud)+'</td>'+
      '<td class="r">'+r.vol_ratio.toFixed(2)+'×</td>'+
      '<td class="r">'+fmtDrift(r.abnormal_drift)+'</td>'+
      '<td class="r '+(r.days_since_material===null?'neu':'')+'">'+
        (r.days_since_material===null?'—':r.days_since_material)+'</td>'+
    '</tr>';
  }).join('');
}

function renderCards(){
  var c=document.getElementById('cards'), em=document.getElementById('empty-c');
  Array.from(c.children).forEach(function(el){if(el!==em)el.remove();});
  if(!FILT.length){em.style.display='';return;}
  em.style.display='none';
  var f=document.createDocumentFragment();
  FILT.forEach(function(r){
    var d=document.createElement('div'); d.className='card';
    var drift=(r.abnormal_drift>=0?'+':'')+(r.abnormal_drift*100).toFixed(1)+'%';
    d.innerHTML=
      '<div class="ct">'+tierBadge(r.tier_label)+
        '<span class="ck"><a href="'+(r.asx_url||'#')+'" target="_blank" rel="noopener">'+r.ticker+'</a></span>'+
      '</div>'+
      '<div class="cn" title="'+r.name+'">'+r.name+'</div>'+
      '<div class="cd"></div>'+
      '<div class="cm">'+
        '<div><span class="cml">Vol Ratio</span><span class="cmv">'+r.vol_ratio.toFixed(2)+'×</span></div>'+
        '<div><span class="cml">Drift</span><span class="cmv '+(r.abnormal_drift>0?'pos':'neg')+'">'+drift+'</span></div>'+
        '<div><span class="cml">Mkt Cap</span><span class="cmv">'+fmtCapPlain(r.market_cap_aud)+'</span></div>'+
        '<div><span class="cml">Days Since Ann</span><span class="cmv '+(r.days_since_material===null?'neu':'')+'">'+
          (r.days_since_material===null?'—':r.days_since_material)+'</span></div>'+
      '</div>';
    f.appendChild(d);
  });
  c.insertBefore(f,em);
}

// Sortable headers
document.querySelectorAll('#tbl thead th[data-k]').forEach(function(th){
  th.addEventListener('click',function(){
    var k=th.dataset.k;
    if(SK===k) SA=!SA; else{SK=k;SA=false;}
    document.querySelectorAll('#tbl thead th').forEach(function(h){h.classList.remove('sort-asc','sort-desc');});
    th.classList.add(SA?'sort-asc':'sort-desc');
    render();
  });
});
document.querySelector('[data-k="tier_num"]').classList.add('sort-asc');

// Boot
if(typeof BAKED_CSV==='string'&&BAKED_CSV.length>0){
  boot(BAKED_CSV);
} else {
  fetch('./screener_output.csv')
    .then(function(r){if(!r.ok)throw new Error();return r.text();})
    .then(boot)
    .catch(function(){
      document.querySelector('#load-screen p').textContent='No data — run screener.py first.';
      document.querySelector('.spinner').style.display='none';
    });
}
</script>
</body>
</html>
